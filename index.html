<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figurinhas Express</title>

  <style>
    body { font-family: Arial; margin: 0; background: #020617; color: white; }
    header { text-align: center; padding: 30px; }
    .container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 40px; }
    .card { background: #1e293b; padding: 25px; border-radius: 16px; width: 260px; }
    input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 8px; border: none; }
    button { width: 100%; margin-top: 10px; padding: 12px; border: none; border-radius: 10px; background: #22c55e; color: white; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <h1>🚀 Figurinhas Express</h1>
  <p>Pagamento automático + entrega por e-mail</p>
</header>

<div class="container">

  <div class="card">
    <h2>Pacote Básico</h2>
    <p>50 figurinhas</p>
    <input type="email" id="email1" placeholder="Seu e-mail">
    <button onclick="comprar('Básico', 'email1')">Comprar R$5</button>
  </div>

  <div class="card">
    <h2>Pacote Premium</h2>
    <p>150 figurinhas</p>
    <input type="email" id="email2" placeholder="Seu e-mail">
    <button onclick="comprar('Premium', 'email2')">Comprar R$12</button>
  </div>

  <div class="card">
    <h2>Pacote Ultra</h2>
    <p>300 figurinhas</p>
    <input type="email" id="email3" placeholder="Seu e-mail">
    <button onclick="comprar('Ultra', 'email3')">Comprar R$20</button>
  </div>

</div>

<script>
function comprar(pacote, emailId) {
  const email = document.getElementById(emailId).value;

  if (!email) {
    alert("Digite seu e-mail");
    return;
  }

  fetch("https://figurinhas-api.onrender.com/criar-pagamento", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ pacote, email })
  })
    .then(res => res.json())
    .then(data => {
      console.log("RESPOSTA:", data);

      if (data.init_point) {
        window.location.href = data.init_point;
      } else {
        alert("Erro: link de pagamento não gerado");
      }
    })
    .catch(err => {
      console.error("ERRO:", err);
      alert("Erro ao iniciar pagamento");
    });
}

// Apenas mensagem visual (SEGURO)
window.onload = function() {
  const params = new URLSearchParams(window.location.search);
  const status = params.get("status");

  if (status === "approved") {
    alert("Pagamento aprovado! Você receberá no e-mail em instantes.");
  }

  if (status === "failure") {
    alert("Pagamento não aprovado.");
  }

  if (status === "pending") {
    alert("Pagamento pendente. Aguarde a confirmação.");
  }
}
</script>

</body>
</html>
